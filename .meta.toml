# Generated from:
# https://github.com/plone/meta/tree/2.x/src/plone/meta/default
# See the inline comments on how to expand/tweak this configuration file
[meta]
template = "default"
commit-id = "2.8.0"

[github]
# remove the dependencies job, because the anatomy of this package is a little bit wired
# all imports are not checkable by `uvx --with tox-uv tox -r -e dependencies`

jobs = [
   "qa",
   "coverage",
   "release_ready",
   "circular",
   ]

[tox]
test_matrix = {"6.2" = ["*"]}

[pyproject]
check_manifest_ignores = """
    "*.cfg",
"""
dependencies_ignores = "['plone.app.vocabularies']"
dependencies_mappings = [
    "ExtensionClass = ['ComputedAttribute']",
    ]


